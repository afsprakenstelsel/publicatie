name: Deploy MkDocs naar GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - run: pip install -r requirements.txt

      - run: python scripts/add_relations.py

      - run: python scripts/build_all.py

      - run: ghp-import site/ -p -f
